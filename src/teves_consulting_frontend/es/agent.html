<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agente Aionico</title>
  <!-- GA4 -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-WMZ9MD4EY4"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-WMZ9MD4EY4');
</script>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      max-width: 760px;
      margin: 40px auto;
      padding: 0 20px;
      line-height: 1.5;
      color: #1f2937;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 0.25rem;
    }

    .subtitle {
      color: #6b7280;
      margin-bottom: 2rem;
    }

    textarea {
      width: 100%;
      min-height: 120px;
      padding: 12px;
      font-size: 1rem;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      box-sizing: border-box;
    }

    button {
      margin-top: 12px;
      padding: 10px 18px;
      border: none;
      border-radius: 10px;
      background: #111827;
      color: white;
      font-size: 1rem;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .answer {
      margin-top: 28px;
      padding: 18px;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      background: #f9fafb;
      white-space: pre-wrap;
    }

    .feedback {
      margin-top: 18px;
      font-size: 0.9rem;
      color: #6b7280;
    }

    .feedback a {
      color: #374151;
    }
  </style>
</head>

<body>
  <h1>Agente Aionico</h1>
  <p class="subtitle">Haz preguntas prácticas para tener una conversación clara y fundamentada.</p>

  <textarea id="query" placeholder="Ejemplo: Que alimentos debo tener en casa?"></textarea>
  <br />
  <button id="askButton" onclick="askAgent()">Pregunta</button>

  <div id="answer" class="answer" style="display:none;"></div>

  <div id="feedback" style="margin-top: 10px; display:none;">
  <button onclick="sendFeedback('down')">👎 La respuesta necesita trabajo</button>
  </div>

  <script>
    async function askAgent() {
      const query = document.getElementById("query").value.trim();
      const answerBox = document.getElementById("answer");
      const button = document.getElementById("askButton");

      if (!query) return;

      button.disabled = true;
      button.textContent = "Pensando...";
      answerBox.style.display = "block";
      answerBox.textContent = "";

      try {
        const response = await fetch("https://aionic-agent-api.onrender.com/ask", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ query })
        });

        const data = await response.json();

        answerBox.style.display = "block";

        if (!response.ok) {
          answerBox.textContent =
            data.detail || "Request limit reached. Please try again later.";
          return;
        }        
        answerBox.textContent = data.answer || "No answer returned.";
        document.getElementById("feedback").style.display = "block";
        // store context for feedback
        window.lastInteraction = {
          query: query,
          answer: data.answer
        };
      } catch (err) {
        answerBox.textContent = "The agent is waking up or temporarily unavailable. Please try again in a moment.";
      } finally {
        button.disabled = false;
        button.textContent = "Pregunta";
      }
    }
    async function sendFeedback(type) {
      if (!window.lastInteraction) return;

      try {
        await fetch("https://aionic-agent-api.onrender.com/feedback", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            rating: type,
            query: window.lastInteraction.query,
            answer: window.lastInteraction.answer,
            timestamp: new Date().toISOString()
          })
        });

        document.getElementById("feedback").innerHTML =
          "Gracias — esto ayuda a mejorar el agente.";
      } catch (err) {
        console.error("Feedback failed", err);
      }
    }
  </script>
</body>
</html>
