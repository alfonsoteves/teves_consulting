<head>

  <style>
    html,
    body {
      min-height: 100%;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      margin: 0;
      padding: 0;
      line-height: 1.5;
      color: #1f2937;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: #ffffff;
    }

    .site-header,
    .site-footer {
      width: 100%;
      border-color: #e5e7eb;
    }

    .site-header {
      border-bottom: 1px solid #e5e7eb;
    }

    .site-footer {
      border-top: 1px solid #e5e7eb;
      margin-top: auto;
      padding: 0px 0;
      color: #64748b;
      font-size: 0.875rem;
    }

    .header-inner,
    .footer-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 25px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-sizing: border-box;
    }

    .header-links {
      display: flex;
      gap: 16px;
      align-items: center;
      font-size: 0.87rem;
    }
    .header-inner-nav-only {
      justify-content: flex-end;
    }


    .footer-links {
      display: flex;
      gap: 25px;
      align-items: center;
    }

    .site-header a,
    .site-footer a {
      color: #1f2937;
      text-decoration: none;
    }

    .site-header a:hover,
    .site-footer a:hover {
      text-decoration: underline;
    }

    .brand-link {
      font-size: 1.125rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .page-main {
      width: 100%;
      max-width: 760px;
      margin: 40px auto;
      padding: 0 20px;
      box-sizing: border-box;
      flex: 1;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 0.25rem;
    }

    .subtitle {
      color: #6b7280;
      margin-bottom: 2rem;
    }

    textarea {
      width: 100%;
      min-height: 90px;
      padding: 12px;
      font-size: 1rem;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      box-sizing: border-box;
    }

    .composer {
      margin-top: 24px;
    }

    .composer textarea {
      display: block;
    }

    .composer button {
      margin-top: 12px;
    }
    
    button {
      margin-top: 12px;
      padding: 10px 18px;
      border: none;
      border-radius: 10px;
      background: #111827;
      color: white;
      font-size: 1rem;
      cursor: pointer;
    }

    .answer {
      margin-top: 28px;
      padding: 18px;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      background: #f9fafb;
      white-space: pre-wrap;
    }

    .conversation {
      margin-top: 28px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      padding: 14px 16px;
      border-radius: 14px;
      white-space: pre-wrap;
      line-height: 1.6;
    }

    .message.user {
      align-self: flex-end;
      max-width: 85%;
      background: #111827;
      color: white;
    }

    .message.assistant {
      align-self: flex-start;
      max-width: 100%;
      border: 1px solid #e5e7eb;
      background: #f9fafb;
      color: #1f2937;
    }

    body.dark-mode .message.assistant {
      background: #1a1d21;
      border: 1px solid #2c3138;
      color: #f3f4f6;
    }
    @keyframes pulseT {
      0% {
        opacity: 0.35;
        transform: scale(0.96);
      }

      50% {
        opacity: 1;
        transform: scale(1.08);
      }

      100% {
        opacity: 0.35;
        transform: scale(0.96);
      }
    }
    .thinking-logo-img {
      width: 22px;
      height: 22px;
      object-fit: contain;
      animation: pulseT 1.1s infinite ease-in-out;
    }

    .theme-toggle {
      margin: 0;
      padding: 0;
      width: auto;
      height: auto;
      border: none;
      border-radius: 0;
      background: transparent;
      color: #1f2937;
      cursor: pointer;
      font-size: 0.95rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .auth-button {
      margin: 0;
      padding: 0;
      border: none;
      background: transparent;
      color: #1f2937;
      cursor: pointer;
      font-size: 0.87rem;
    }

    .auth-button:hover {
      text-decoration: underline;
    }

    body.dark-mode .auth-button {
      display: none;
}
    body.dark-mode {
      background: #111315;
      color: #f3f4f6;
    }

    body.dark-mode .site-header {
      border-bottom: none;
    }

    body.dark-mode .site-header a,
    body.dark-mode .header-links span {
      color: #f3f4f6;
    }

    body.dark-mode .brand-link,
    body.dark-mode .header-links a,
    body.dark-mode .header-links span {
      display: none;
    }

    body.dark-mode .header-inner {
      justify-content: flex-end;
    }

    body.dark-mode .site-footer {
      display: none;
    }

    body.dark-mode .page-main {
      max-width: 720px;
      margin-top: 80px;
    }

    body.dark-mode textarea {
      background: #1a1d21;
      color: #f3f4f6;
      border: 1px solid #2c3138;
    }

    body.dark-mode .answer {
      background: #1a1d21;
      border: 1px solid #2c3138;
      color: #f3f4f6;
    }

    body.dark-mode .subtitle {
      color: #9ca3af;
    }

    body.dark-mode .theme-toggle {
      background: transparent;
      color: #f9fafb;
      border: none;
    }
  </style>
</head>

<body>
<header class="site-header">
  <div class="header-inner header-inner-nav-only">
<div class="header-links">
      <a href="https://www.tevesconsulting.com/agent.html">EN</a>
      <span>|</span>
      <button id="themeToggle" class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
        🌙
      </button>
      <span>|</span>
      <button id="authButton" class="auth-button" onclick="handleAuth()">
        Iniciar sesión
      </button>
    </div>
  </div>
</header>

<main class="page-main">
  <h1>Aion</h1>

  <p class="subtitle">
    Haz una pregunta práctica y recibe una respuesta clara y fundamentada.
  </p>

  <div id="conversation" class="conversation"></div>

  <div class="composer">
    <textarea
      id="query"
      placeholder="Ejemplo: ¿Qué alimentos debo tener siempre en casa?"
    ></textarea>

    <button id="askButton" onclick="askAgent()">Preguntar</button>
  </div>

  <div id="feedback" style="margin-top: 10px; display:none;">
    <button onclick="sendFeedback('down')">👎 La respuesta necesita trabajo</button>
  </div>

 <script type="module">
  import { Actor, HttpAgent } from "https://esm.sh/@dfinity/agent@2.1.3";
  import { IDL } from "https://esm.sh/@dfinity/candid@2.1.3";
  import { AuthClient } from "https://esm.sh/@dfinity/auth-client@2.1.3?deps=@dfinity/candid@2.1.3,@dfinity/agent@2.1.3";

  const BACKEND_CANISTER_ID = "lzsyn-biaaa-aaaai-rakea-cai";
  
  let authClient = null;
  let isAuthenticated = false;
  let identity = null;
  let sessionSaved = false;
  let inactivityTimer = null;
  const INACTIVITY_TIMEOUT = 10 * 60 * 1000;
  
  window.messages = [];
  window.continuityContext = [];

  const idlFactory = ({ IDL }) => {
    const Relationship = IDL.Record({
      subject: IDL.Text,
      predicate: IDL.Text,
      target: IDL.Text,
      category: IDL.Text,
    });

    const MemorySummary = IDL.Record({
      id: IDL.Nat,
      owner: IDL.Principal,
      createdAt: IDL.Int,
      updatedAt: IDL.Int,
      title: IDL.Text,
      summary: IDL.Text,
      topics: IDL.Vec(IDL.Text),
      tags: IDL.Vec(IDL.Text),
      keyDecisions: IDL.Vec(IDL.Text),
      relationships: IDL.Vec(Relationship),
      milestone: IDL.Bool,
      importance: IDL.Nat,
      memoryType: IDL.Text,
      sourceSessionId: IDL.Text,
      confidence: IDL.Nat,
      status: IDL.Text,
    });

    return IDL.Service({
      addFeedback: IDL.Func(
        [IDL.Text, IDL.Text, IDL.Text, IDL.Text],
        [IDL.Bool],
        []
      ),
      getFeedbackCount: IDL.Func([], [IDL.Nat], ["query"]),
      whoami: IDL.Func([], [IDL.Text], []),
      storeSummary: IDL.Func(
        [
          IDL.Text,               // title
          IDL.Text,               // summary
          IDL.Vec(IDL.Text),      // topics
          IDL.Vec(IDL.Text),      // tags
          IDL.Vec(IDL.Text),      // keyDecisions
          IDL.Vec(Relationship),  // relationships
          IDL.Bool,               // milestone
          IDL.Nat,                // importance
          IDL.Text,               // memoryType
          IDL.Text,               // sourceSessionId
          IDL.Nat,                // confidence
          IDL.Text                // status
        ],
        [IDL.Nat],
        []
      ),
      getMyRecentSummaries: IDL.Func(
        [IDL.Nat],
        [IDL.Vec(MemorySummary)],
        ["query"]
      ),
      getMyMilestoneSummaries: IDL.Func(
        [],
        [IDL.Vec(MemorySummary)],
        ["query"]
      ),
      deleteAllMySummaries: IDL.Func([], [IDL.Bool], []),
    });
  };

  function normalizeRelationships(relationships = []) {
    if (!Array.isArray(relationships)) {
      return [];
    }

    return relationships
      .map((relationship) => ({
        subject: String(relationship.subject || ""),
        predicate: String(relationship.predicate || relationship.relationshipType || ""),
        target: String(relationship.target || relationship.targetMemoryId || ""),
        category: String(relationship.category || ""),
      }))
      .filter((relationship) =>
        relationship.subject &&
        relationship.predicate &&
        relationship.target
      );
  }

  const agent = new HttpAgent({
    host: "https://ic0.app",
  });

  window.feedbackActor = Actor.createActor(idlFactory, {
    agent,
    canisterId: BACKEND_CANISTER_ID,
  });

  async function initAuth() {
    authClient = await AuthClient.create();

    isAuthenticated = await authClient.isAuthenticated();

    if (isAuthenticated) {
      identity = authClient.getIdentity();
    }

    updateAuthUI();

    if (isAuthenticated) {
      await createAuthenticatedActor();
      await loadContinuityContext();
    }
  }

  async function createAuthenticatedActor() {
    const authenticatedAgent = new HttpAgent({
      identity,
      host: "https://ic0.app",
    });

    window.feedbackActor = Actor.createActor(idlFactory, {
      agent: authenticatedAgent,
      canisterId: BACKEND_CANISTER_ID,
    });

    try {
      const principal = await window.feedbackActor.whoami();
      console.log("Authenticated principal:", principal);
    } catch (err) {
      console.error("whoami failed:", err);
    }
  }

  function updateAuthUI() {
    const authButton = document.getElementById("authButton");

    if (!authButton) return;

    if (isAuthenticated) {
      authButton.textContent = "Cerrar sesión";
    } else {
      authButton.textContent = "Iniciar sesión";
    }
  }

  window.handleAuth = async function handleAuth() {
    if (!authClient) {
      authClient = await AuthClient.create();
    }

    if (isAuthenticated) {
      await saveCurrentSession({ refreshContinuity: false });

      await authClient.logout();
      isAuthenticated = false;
      identity = null;
      sessionSaved = false;

      window.feedbackActor = Actor.createActor(idlFactory, {
        agent,
        canisterId: BACKEND_CANISTER_ID,
      });

      updateAuthUI();
      return;
    }

    await authClient.login({
      identityProvider: "https://identity.ic0.app",
      onSuccess: async () => {
        isAuthenticated = true;
        identity = authClient.getIdentity();

        updateAuthUI();

        await createAuthenticatedActor();
        await loadContinuityContext();
      },
    });
  };
   
    function resetInactivityTimer() {

    if (!isAuthenticated) {
      return;
    }

    if (inactivityTimer) {
      clearTimeout(inactivityTimer);
    }

    inactivityTimer = setTimeout(async () => {

      console.log("Inactivity timeout reached. Saving session.");

      await saveCurrentSession({
        refreshContinuity: true
      });

    }, INACTIVITY_TIMEOUT);
  }   
   
    initAuth();

    function appendMessage(role, text) {
      const conversation = document.getElementById("conversation");

      const message = document.createElement("div");
      message.className = `message ${role}`;
      message.textContent = text;

      conversation.appendChild(message);

      message.scrollIntoView({
        behavior: "smooth",
        block: "end"
      });

      window.messages.push({
        role,
        text,
        timestamp: new Date().toISOString(),
      });
    }

   window.saveCurrentSession = async function saveCurrentSession(options = {}) {
      if (!isAuthenticated) {
        console.warn("Not authenticated. Session summary was not saved.");
        return;
      }

      if (sessionSaved) {
        console.warn("Session already saved.");
        return;
      }

      if (!window.messages || window.messages.length < 4) {
        console.warn("Not enough conversation to summarize.");
        return;
      }

      let session = null;

      try {
        const response = await fetch("https://aionic-agent-api.onrender.com/summarize-session", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            messages: window.messages
          })
        });

        if (response.ok) {
          session = await response.json();
          console.log("Backend summary generated:", session);
        } else {
          console.warn("Backend summary failed, using frontend fallback.");
          return;
        }

      } catch (err) {
        console.warn("Backend summary unavailable, using frontend fallback.", err);
        return;
      }

      try {
        const id = await window.feedbackActor.storeSummary(
          session.title,
          session.summary,
          session.topics || [],
          session.tags || [],
          session.keyDecisions || [],
          normalizeRelationships(session.relationships),
          session.milestone || false,
          session.importance || 5,
          session.memoryType || "session",
          session.sourceSessionId || "",
          session.confidence || 80,
          session.status || "active"
        );
        sessionSaved = true;
        window.messages = [];

        if (inactivityTimer) {
          clearTimeout(inactivityTimer);
          inactivityTimer = null;
        }

        if (options.refreshContinuity) {
          await loadContinuityContext();
        }

        console.log("Session summary saved:", {
          id,
          ...session,
        });

      } catch (err) {
        console.error("Failed to save session summary:", err);
      }
    };

    window.askAgent = async function askAgent() {
    const query = document.getElementById("query").value.trim();
    const conversation = document.getElementById("conversation");
    const button = document.getElementById("askButton");

    document.getElementById("feedback").style.display = "none";

    if (!query) return;

    button.disabled = true;
    button.innerHTML = '<img class="thinking-logo-img" src="/assets/images/t-logo-white.png" alt="Loading" />';
    
    if (sessionSaved) {
      sessionSaved = false;
      window.messages = [];
    }
    
    appendMessage("user", query);
    resetInactivityTimer();

    const queryInput = document.getElementById("query");
    queryInput.value = "";
    queryInput.placeholder = "";

    try {
      const response = await fetch("https://aionic-agent-api.onrender.com/ask", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          query,
          continuityContext: window.continuityContext || []
        })
      });

      const data = await response.json();

      if (!response.ok) {
        appendMessage("assistant", data.detail || "Límite de solicitudes alcanzado. Inténtalo nuevamente más tarde.");
        return;        
      }
      appendMessage("assistant", data.answer || "No se recibió respuesta.");
      document.getElementById("feedback").style.display = "block";

      window.lastInteraction = {
        query: query,
        answer: data.answer
      };

    } catch (err) {
      appendMessage("assistant", "El agente está temporalmente no disponible. Inténtalo nuevamente en un momento.");      
    } finally {
      button.disabled = false;
      button.textContent = "Preguntar";
    }
  };

  window.sendFeedback = async function sendFeedback(type) {
    if (!window.lastInteraction) return;

    const timestamp = new Date().toISOString();

    try {
      await window.feedbackActor.addFeedback(
        type,
        window.lastInteraction.query,
        window.lastInteraction.answer,
        timestamp
      );

      document.getElementById("feedback").innerHTML =
        "Gracias — esto ayuda a mejorar el agente.";

    } catch (icpErr) {
      console.error("ICP feedback failed, falling back to Render", icpErr);

      try {
        await fetch("https://aionic-agent-api.onrender.com/feedback", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            rating: type,
            query: window.lastInteraction.query,
            answer: window.lastInteraction.answer,
            timestamp: timestamp
          })
        });

        document.getElementById("feedback").innerHTML =
          "Gracias — esto ayuda a mejorar el agente.";

      } catch (renderErr) {
        console.error("Feedback failed", renderErr);
      }
    }
  };


  window.loadContinuityContext = async function loadContinuityContext() {
    if (!isAuthenticated) {
      console.warn("Not authenticated. Continuity context not loaded.");
      return [];
    }

        try {
      const recent =
        await window.feedbackActor.getMyRecentSummaries(5);

      const milestones =
        await window.feedbackActor.getMyMilestoneSummaries();
      
      const merged = [...recent];

      milestones.forEach(milestone => {

        const exists = merged.some(
          item => item.id.toString() === milestone.id.toString()
        );

        if (!exists) {
          merged.push(milestone);
        }

      });

      window.continuityContext = merged.map((s) => ({
        title: s.title,
        summary: s.summary,
        topics: s.topics || [],
        keyDecisions: s.keyDecisions || [],
        tags: s.tags || [],
        relationships: s.relationships || [],
        milestone: s.milestone,
        importance: s.importance?.toString?.() || "5",
        memoryType: s.memoryType || "session",
        status: s.status || "active",
        createdAt: s.createdAt.toString(),
      }));

      console.log("Continuity context loaded:", window.continuityContext);
      return window.continuityContext;
    } catch (err) {
      console.error("Failed to load continuity context:", err);
      return [];
    }
  };

</script>

</main>
<footer class="site-footer">
  <div class="footer-inner">
    <p>
      © <span id="year"></span> Teves Consulting LLC. Todos los derechos reservados.
    </p>

    <div class="footer-links">
      <a href="/es/about-aion.html">Acerca de Aion</a>
    </div>
  </div>
</footer>

<script>
  document.getElementById('year').textContent = new Date().getFullYear();
</script>
<script>
  function applyTheme(theme) {
    if (theme === "dark") {
      document.body.classList.add("dark-mode");
      document.getElementById("themeToggle").textContent = "☀️";
    } else {
      document.body.classList.remove("dark-mode");
      document.getElementById("themeToggle").textContent = "🌙";
    }
  }

  function toggleTheme() {
    const isDark = document.body.classList.contains("dark-mode");

    if (isDark) {
      localStorage.setItem("aion-theme", "light");
      applyTheme("light");
    } else {
      localStorage.setItem("aion-theme", "dark");
      applyTheme("dark");
    }
  }

  const savedTheme = localStorage.getItem("aion-theme") || "light";
  applyTheme(savedTheme);
</script>
</body>
</html>
