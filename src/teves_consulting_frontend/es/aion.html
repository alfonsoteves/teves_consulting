    .aion-continuity-indicator {
      position: relative;
      width: 34px;

    .aion-continuity-mark {

<body>
<header class="site-header">
  <div class="header-inner">
    <div id="aionContinuityIndicatorContainer" class="aion-continuity-indicator-container"></div>
<div class="header-links">
      <a href="https://www.tevesconsulting.com/es/index.html">Aion</a>
      <a href="https://www.tevesconsulting.com/aion.html">EN</a>
      <button id="authButton" class="auth-button" onclick="handleAuth()">
        Iniciar sesión
      </button>
      <button id="themeToggle" class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
        🌙
      </button>
    </div>
  </div>
</header>

<div id="aionContinuityModal" class="aion-continuity-modal-backdrop" aria-hidden="true">
  <div class="aion-continuity-modal" role="dialog" aria-modal="true" aria-labelledby="aionContinuityModalTitle">
    <h2 id="aionContinuityModalTitle">Memoria de continuidad</h2>
    <p>Tu continuidad guardada ayuda a Aion a preservar contexto útil entre sesiones.</p>
    <p id="aionContinuityModalStatus"></p>
    <div class="aion-continuity-modal-actions">
      <button class="aion-continuity-secondary-button" onclick="closeAionContinuityModal()">Cancelar</button>
      <button id="aionContinuityDeleteButton" class="aion-continuity-delete-button" onclick="deleteAionContinuityMemory()">Eliminar toda la memoria</button>
    </div>
  </div>
</div>
<div id="aionContinuityToast" class="aion-continuity-toast" role="status" aria-live="polite"></div>

<main class="page-main">
  <h1>Aion</h1>

  <p class="subtitle">
    Haz una pregunta práctica y recibe una respuesta clara y fundamentada.
  </p>

  <div id="conversation" class="conversation"></div>

  <div class="composer">
    <textarea
      id="query"
      placeholder="Ejemplo: ¿Qué alimentos debo tener siempre en casa?"
    ></textarea>

    <button id="askButton" onclick="askAgent()">Preguntar</button>
  </div>

  <div id="feedback" style="margin-top: 10px; display:none;">
    <button onclick="sendFeedback('down')">👎 La respuesta necesita trabajo</button>
  </div>

 <script type="module">
  import { Actor, HttpAgent } from "https://esm.sh/@dfinity/agent@2.1.3";
  import { IDL } from "https://esm.sh/@dfinity/candid@2.1.3";
  import { AuthClient } from "https://esm.sh/@dfinity/auth-client@2.1.3?deps=@dfinity/candid@2.1.3,@dfinity/agent@2.1.3";

  const BACKEND_CANISTER_ID = "lzsyn-biaaa-aaaai-rakea-cai";

  let authClient = null;
  let isAuthenticated = false;
  let identity = null;
  let sessionSaved = false;
  let inactivityTimer = null;
  const INACTIVITY_TIMEOUT = 10 * 60 * 1000;
  const aionContinuityState = {
    authenticated: false,
    memoryCount: 0,
    loading: false,
    deleting: false,
    error: null,
  };

  window.messages = [];
  window.continuityContext = [];

  const idlFactory = ({ IDL }) => {
    const Relationship = IDL.Record({
      subject: IDL.Text,
      predicate: IDL.Text,
      target: IDL.Text,
      category: IDL.Text,
    });

    const MemorySummary = IDL.Record({
      id: IDL.Nat,
      owner: IDL.Principal,
      createdAt: IDL.Int,
      updatedAt: IDL.Int,
      title: IDL.Text,
      summary: IDL.Text,
      topics: IDL.Vec(IDL.Text),
      tags: IDL.Vec(IDL.Text),
      keyDecisions: IDL.Vec(IDL.Text),
      relationships: IDL.Vec(Relationship),
      milestone: IDL.Bool,
      importance: IDL.Nat,
      memoryType: IDL.Text,
      sourceSessionId: IDL.Text,
      confidence: IDL.Nat,
      status: IDL.Text,
    });

    return IDL.Service({
      addFeedback: IDL.Func(
        [IDL.Text, IDL.Text, IDL.Text, IDL.Text],
        [IDL.Bool],
        []
      ),
      getFeedbackCount: IDL.Func([], [IDL.Nat], ["query"]),
      whoami: IDL.Func([], [IDL.Text], []),
      storeSummary: IDL.Func(
        [
          IDL.Text,               // title
          IDL.Text,               // summary
          IDL.Vec(IDL.Text),      // topics
          IDL.Vec(IDL.Text),      // tags
          IDL.Vec(IDL.Text),      // keyDecisions
          IDL.Vec(Relationship),  // relationships
          IDL.Bool,               // milestone
          IDL.Nat,                // importance
          IDL.Text,               // memoryType
          IDL.Text,               // sourceSessionId
          IDL.Nat,                // confidence
          IDL.Text                // status
        ],
        [IDL.Nat],
        []
      ),
      getMyRecentSummaries: IDL.Func(
        [IDL.Nat],
        [IDL.Vec(MemorySummary)],
        ["query"]
      ),
      getMyAllSummaries: IDL.Func(
        [],
        [IDL.Vec(MemorySummary)],
        ["query"]
      ),
      getMyMilestoneSummaries: IDL.Func(
        [],
        [IDL.Vec(MemorySummary)],
        ["query"]
      ),
      deleteAllMySummaries: IDL.Func([], [IDL.Bool], []),
    });
  };

  function normalizeRelationships(relationships = []) {
    if (!Array.isArray(relationships)) {
      return [];
    }

    return relationships
      .map((relationship) => ({
        subject: String(relationship.subject || ""),
        predicate: String(relationship.predicate || relationship.relationshipType || ""),
        target: String(relationship.target || relationship.targetMemoryId || ""),
        category: String(relationship.category || ""),
      }))
      .filter((relationship) =>
        relationship.subject &&
        relationship.predicate &&
        relationship.target
      );
  }

  const agent = new HttpAgent({
    host: "https://ic0.app",
  });

  window.feedbackActor = Actor.createActor(idlFactory, {
    agent,
    canisterId: BACKEND_CANISTER_ID,
  });

  async function initAuth() {
    authClient = await AuthClient.create();

    isAuthenticated = await authClient.isAuthenticated();

    if (isAuthenticated) {
      identity = authClient.getIdentity();
    }

    updateAuthUI();

    if (isAuthenticated) {
      await createAuthenticatedActor();
      await loadContinuityContext();
    }
  }

  async function createAuthenticatedActor() {
    const authenticatedAgent = new HttpAgent({
      identity,
      host: "https://ic0.app",
    });

    window.feedbackActor = Actor.createActor(idlFactory, {
      agent: authenticatedAgent,
      canisterId: BACKEND_CANISTER_ID,
    });

    try {
      const principal = await window.feedbackActor.whoami();
      console.log("Authenticated principal:", principal);
    } catch (err) {
      console.error("whoami failed:", err);
    }
  }

  function updateAuthUI() {
    const authButton = document.getElementById("authButton");

    if (!authButton) return;

    if (isAuthenticated) {
      authButton.textContent = "Cerrar sesión";
    } else {
      authButton.textContent = "Iniciar sesión";
    }

    aionContinuityState.authenticated = isAuthenticated;
    if (!isAuthenticated) {
      aionContinuityState.memoryCount = 0;
      aionContinuityState.loading = false;
      aionContinuityState.deleting = false;
      aionContinuityState.error = null;
    }
    renderAionContinuityIndicator();
  }

  function renderAionContinuityIndicator() {
    const container = document.getElementById("aionContinuityIndicatorContainer");
    if (!container) return;

    const active = aionContinuityState.authenticated && aionContinuityState.memoryCount > 0;
    const empty = aionContinuityState.authenticated && aionContinuityState.memoryCount === 0;
    const className = [
      "aion-continuity-indicator",
      active ? "active" : "",
      empty ? "empty" : "",
    ].filter(Boolean).join(" ");
    const title = !aionContinuityState.authenticated
      ? "Inicia sesión para activar la continuidad."
      : aionContinuityState.memoryCount > 0
        ? `Continuidad activa. ${aionContinuityState.memoryCount} ${aionContinuityState.memoryCount === 1 ? "memoria guardada" : "memorias guardadas"}.`
        : "Continuidad activada. Todavía no hay memorias.";
    const particles = active
      ? '<span class="aion-continuity-particle one"></span><span class="aion-continuity-particle two"></span><span class="aion-continuity-particle three"></span>'
      : "";

    container.innerHTML = `
      <button
        class="${className}"
        type="button"
        title="${title}"
        aria-label="${title}"
        ${aionContinuityState.authenticated ? 'onclick="openAionContinuityModal()"' : "disabled"}
      >
        <svg class="aion-continuity-mark" viewBox="0 0 64 64" aria-hidden="true">
          <circle cx="32" cy="32" r="25"></circle>
          <circle cx="32" cy="32" r="3.5"></circle>
          <ellipse cx="32" cy="32" rx="7.5" ry="24"></ellipse>
          <ellipse cx="32" cy="32" rx="7.5" ry="24" transform="rotate(30 32 32)"></ellipse>
          <ellipse cx="32" cy="32" rx="7.5" ry="24" transform="rotate(60 32 32)"></ellipse>
          <ellipse cx="32" cy="32" rx="7.5" ry="24" transform="rotate(90 32 32)"></ellipse>
          <ellipse cx="32" cy="32" rx="7.5" ry="24" transform="rotate(120 32 32)"></ellipse>
          <ellipse cx="32" cy="32" rx="7.5" ry="24" transform="rotate(150 32 32)"></ellipse>
        </svg>
        ${particles}
      </button>
    `;
  }

  function showAionContinuityToast(message) {
    const toast = document.getElementById("aionContinuityToast");
    if (!toast) return;

    toast.textContent = message;
    toast.classList.add("show");
    window.setTimeout(() => {
      toast.classList.remove("show");
    }, 2200);
  }

  window.openAionContinuityModal = function openAionContinuityModal() {
    if (!isAuthenticated || !identity) return;

    const modal = document.getElementById("aionContinuityModal");
    const status = document.getElementById("aionContinuityModalStatus");
    const deleteButton = document.getElementById("aionContinuityDeleteButton");
    if (!modal || !status || !deleteButton) return;

    if (aionContinuityState.memoryCount > 0) {
      status.textContent = `¿Eliminar toda la memoria de continuidad guardada? Esto elimina ${aionContinuityState.memoryCount} ${aionContinuityState.memoryCount === 1 ? "memoria guardada" : "memorias guardadas"} entre sesiones y no se puede deshacer.`;
      deleteButton.style.display = "inline-flex";
      deleteButton.disabled = false;
      deleteButton.textContent = "Eliminar toda la memoria";
    } else {
      status.textContent = "La continuidad está activada. No hay memorias guardadas en este momento.";
      deleteButton.style.display = "none";
    }

    modal.classList.add("open");
    modal.setAttribute("aria-hidden", "false");
  };

  window.closeAionContinuityModal = function closeAionContinuityModal() {
    const modal = document.getElementById("aionContinuityModal");
    if (!modal) return;

    modal.classList.remove("open");
    modal.setAttribute("aria-hidden", "true");
  };

  window.deleteAionContinuityMemory = async function deleteAionContinuityMemory() {
    if (!isAuthenticated || !identity || aionContinuityState.deleting) return;

    const deleteButton = document.getElementById("aionContinuityDeleteButton");
    aionContinuityState.deleting = true;
    aionContinuityState.error = null;
    if (deleteButton) {
      deleteButton.disabled = true;
      deleteButton.textContent = "Eliminando...";
    }

    try {
      const ok = await window.feedbackActor.deleteAllMySummaries();
      if (!ok) {
        throw new Error("Delete request was not confirmed by the canister.");
      }

      window.continuityContext = [];
      aionContinuityState.memoryCount = 0;
      aionContinuityState.deleting = false;
      renderAionContinuityIndicator();
      closeAionContinuityModal();

      const container = document.getElementById("aionContinuityIndicatorContainer");
      if (container) {
        container.classList.add("aion-continuity-flash");
        window.setTimeout(() => container.classList.remove("aion-continuity-flash"), 560);
      }

      showAionContinuityToast("Memoria de continuidad eliminada.");
    } catch (err) {
      console.error("Failed to delete continuity memory:", err);
      aionContinuityState.deleting = false;
      aionContinuityState.error = err;
      if (deleteButton) {
        deleteButton.disabled = false;
        deleteButton.textContent = "Eliminar toda la memoria";
      }
      showAionContinuityToast("No se pudo eliminar la memoria de continuidad. Inténtalo de nuevo.");
    }
  };

  window.handleAuth = async function handleAuth() {
    if (!authClient) {
      authClient = await AuthClient.create();
    }

    if (isAuthenticated) {
      await saveCurrentSession({ refreshContinuity: false });

      await authClient.logout();
      isAuthenticated = false;
      identity = null;
      sessionSaved = false;
      window.continuityContext = [];

      window.feedbackActor = Actor.createActor(idlFactory, {
        agent,
        canisterId: BACKEND_CANISTER_ID,
      });

      updateAuthUI();
      return;
    }

    await authClient.login({
      identityProvider: "https://identity.ic0.app",
      onSuccess: async () => {
        isAuthenticated = true;
        identity = authClient.getIdentity();

        updateAuthUI();

        await createAuthenticatedActor();
        await loadContinuityContext();
      },
    });
  };

    function resetInactivityTimer() {

    if (!isAuthenticated) {
      return;
    }

    if (inactivityTimer) {
      clearTimeout(inactivityTimer);
    }

    inactivityTimer = setTimeout(async () => {

      console.log("Inactivity timeout reached. Saving session.");

      await saveCurrentSession({
        refreshContinuity: true
      });

    }, INACTIVITY_TIMEOUT);
  }

    initAuth();

    function appendMessage(role, text) {
      const conversation = document.getElementById("conversation");

      const message = document.createElement("div");
      message.className = `message ${role}`;
      message.textContent = text;

      conversation.appendChild(message);

      message.scrollIntoView({
        behavior: "smooth",
        block: "end"
      });

      window.messages.push({
        role,
        text,
        timestamp: new Date().toISOString(),
      });
    }

   window.saveCurrentSession = async function saveCurrentSession(options = {}) {
      if (!isAuthenticated) {
        console.warn("Not authenticated. Session summary was not saved.");
        return;
      }

      if (sessionSaved) {
        console.warn("Session already saved.");
        return;
      }

      if (!window.messages || window.messages.length < 4) {
        console.warn("Not enough conversation to summarize.");
        return;
      }

      let session = null;

      try {
        const response = await fetch("https://aionic-agent-api.onrender.com/summarize-session", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            messages: window.messages
          })
        });

        if (response.ok) {
          session = await response.json();
          console.log("Backend summary generated:", session);
        } else {
          console.warn("Backend summary failed, using frontend fallback.");
          return;
        }

      } catch (err) {
        console.warn("Backend summary unavailable, using frontend fallback.", err);
        return;
      }

      try {
        const id = await window.feedbackActor.storeSummary(
          session.title,
          session.summary,
          session.topics || [],
          session.tags || [],
          session.keyDecisions || [],
          normalizeRelationships(session.relationships),
          session.milestone || false,
          session.importance || 5,
          session.memoryType || "session",
          session.sourceSessionId || "",
          session.confidence || 80,
          session.status || "active"
        );
        sessionSaved = true;
        window.messages = [];

        if (inactivityTimer) {
          clearTimeout(inactivityTimer);
          inactivityTimer = null;
        }

        if (options.refreshContinuity) {
          await loadContinuityContext();
        }

        console.log("Session summary saved:", {
          id,
          ...session,
        });

      } catch (err) {
        console.error("Failed to save session summary:", err);
      }
    };

    window.askAgent = async function askAgent() {
    const query = document.getElementById("query").value.trim();
    const conversation = document.getElementById("conversation");
    const button = document.getElementById("askButton");

    document.getElementById("feedback").style.display = "none";

    if (!query) return;

    button.disabled = true;
    button.innerHTML = '<img class="thinking-logo-img" src="/assets/images/t-logo-white.png" alt="Loading" />';

    if (sessionSaved) {
      sessionSaved = false;
      window.messages = [];
    }

    appendMessage("user", query);
    resetInactivityTimer();

    const queryInput = document.getElementById("query");
    queryInput.value = "";
    queryInput.placeholder = "";

    try {
      const response = await fetch("https://aionic-agent-api.onrender.com/ask", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          query,
          continuityContext: window.continuityContext || []
        })
      });

      const data = await response.json();

      if (!response.ok) {
        appendMessage("assistant", data.detail || "Límite de solicitudes alcanzado. Inténtalo nuevamente más tarde.");
        return;
      }
      appendMessage("assistant", data.answer || "No se recibió respuesta.");
      document.getElementById("feedback").style.display = "block";

      window.lastInteraction = {
        query: query,
        answer: data.answer
      };

    } catch (err) {
      appendMessage("assistant", "El agente está temporalmente no disponible. Inténtalo nuevamente en un momento.");
    } finally {
      button.disabled = false;
      button.textContent = "Preguntar";
    }
  };

  window.sendFeedback = async function sendFeedback(type) {
    if (!window.lastInteraction) return;

    const timestamp = new Date().toISOString();

    try {
      await window.feedbackActor.addFeedback(
        type,
        window.lastInteraction.query,
        window.lastInteraction.answer,
        timestamp
      );

      document.getElementById("feedback").innerHTML =
        "Gracias — esto ayuda a mejorar el agente.";

    } catch (icpErr) {
      console.error("ICP feedback failed, falling back to Render", icpErr);

      try {
        await fetch("https://aionic-agent-api.onrender.com/feedback", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            rating: type,
            query: window.lastInteraction.query,
            answer: window.lastInteraction.answer,
            timestamp: timestamp
          })
        });

        document.getElementById("feedback").innerHTML =
          "Gracias — esto ayuda a mejorar el agente.";

      } catch (renderErr) {
        console.error("Feedback failed", renderErr);
      }
    }
  };


  window.loadContinuityContext = async function loadContinuityContext() {
    if (!isAuthenticated) {
      console.warn("Not authenticated. Continuity context not loaded.");
      aionContinuityState.authenticated = false;
      aionContinuityState.memoryCount = 0;
      renderAionContinuityIndicator();
      return [];
    }

    try {
      aionContinuityState.loading = true;
      renderAionContinuityIndicator();
      let merged = [];

      try {
        merged = await window.feedbackActor.getMyAllSummaries();
      } catch (err) {
        console.warn("All summaries unavailable. Falling back to recent summaries.", err);

        const recent =
          await window.feedbackActor.getMyRecentSummaries(5);

        const milestones =
          await window.feedbackActor.getMyMilestoneSummaries();

        merged = [...recent];

        milestones.forEach(milestone => {

          const exists = merged.some(
            item => item.id.toString() === milestone.id.toString()
          );

          if (!exists) {
            merged.push(milestone);
          }

        });
      }

      window.continuityContext = merged.map((s) => ({
        title: s.title,
        summary: s.summary,
        topics: s.topics || [],
        keyDecisions: s.keyDecisions || [],
        tags: s.tags || [],
        relationships: s.relationships || [],
        milestone: s.milestone,
        importance: s.importance?.toString?.() || "5",
        memoryType: s.memoryType || "session",
        status: s.status || "active",
        createdAt: s.createdAt.toString(),
      }));

      aionContinuityState.authenticated = true;
      aionContinuityState.memoryCount = merged.length;
      aionContinuityState.loading = false;
      aionContinuityState.error = null;
      renderAionContinuityIndicator();
      console.log("Continuity context loaded:", window.continuityContext);
      return window.continuityContext;
    } catch (err) {
      console.error("Failed to load continuity context:", err);
      aionContinuityState.loading = false;
      aionContinuityState.error = err;
      renderAionContinuityIndicator();
      return [];
    }
  };

</script>

<script>
  function applyTheme(theme) {
    if (theme === "dark") {
      document.body.classList.add("dark-mode");
      document.getElementById("themeToggle").textContent = "☀";
    } else {
      document.body.classList.remove("dark-mode");
      document.getElementById("themeToggle").textContent = "☾";
    }
  }

  function toggleTheme() {
    const isDark = document.body.classList.contains("dark-mode");

    if (isDark) {
      localStorage.setItem("aion-theme", "light");
      applyTheme("light");
    } else {
      localStorage.setItem("aion-theme", "dark");
      applyTheme("dark");
    }
  }

  const savedTheme = localStorage.getItem("aion-theme") || "light";
  applyTheme(savedTheme);
</script>
