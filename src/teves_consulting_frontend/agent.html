<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aionic Agent</title>
  <!-- GA4 -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-WMZ9MD4EY4"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-WMZ9MD4EY4');
</script>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      max-width: 760px;
      margin: 40px auto;
      padding: 0 20px;
      line-height: 1.5;
      color: #1f2937;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 0.25rem;
    }

    .subtitle {
      color: #6b7280;
      margin-bottom: 2rem;
    }

    textarea {
      width: 100%;
      min-height: 120px;
      padding: 12px;
      font-size: 1rem;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      box-sizing: border-box;
    }

    button {
      margin-top: 12px;
      padding: 10px 18px;
      border: none;
      border-radius: 10px;
      background: #111827;
      color: white;
      font-size: 1rem;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .answer {
      margin-top: 28px;
      padding: 18px;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      background: #f9fafb;
      white-space: pre-wrap;
    }

    .feedback {
      margin-top: 18px;
      font-size: 0.9rem;
      color: #6b7280;
    }

    .feedback a {
      color: #374151;
    }
  </style>
</head>

<body>
  <h1>Aionic Agent</h1>
  <p class="subtitle">Ask a practical question and get a clear, grounded answer.</p>

  <textarea id="query" placeholder="Example: What foods should I always keep at home?"></textarea>
  <br />
  <button id="askButton" onclick="askAgent()">Ask</button>

  <div id="answer" class="answer" style="display:none;"></div>

  <div id="feedback" style="margin-top: 10px; display:none;">
  <button onclick="sendFeedback('down')">👎 This needs work</button>
  </div>

<script type="module">
  import { Actor, HttpAgent } from "https://esm.sh/@dfinity/agent@2.1.3";
  import { IDL } from "https://esm.sh/@dfinity/candid@2.1.3";

  const BACKEND_CANISTER_ID = "lzsyn-biaaa-aaaai-rakea-cai";

  const idlFactory = ({ IDL }) => {
    return IDL.Service({
      addFeedback: IDL.Func(
        [IDL.Text, IDL.Text, IDL.Text, IDL.Text],
        [IDL.Bool],
        []
      ),
      getFeedbackCount: IDL.Func([], [IDL.Nat], ["query"]),
    });
  };

  const agent = new HttpAgent({
    host: "https://ic0.app",
  });

  const feedbackActor = Actor.createActor(idlFactory, {
    agent,
    canisterId: BACKEND_CANISTER_ID,
  });

  window.askAgent = async function askAgent() {
    const query = document.getElementById("query").value.trim();
    const answerBox = document.getElementById("answer");
    const button = document.getElementById("askButton");

    if (!query) return;

    button.disabled = true;
    button.textContent = "Thinking...";
    answerBox.style.display = "block";
    answerBox.textContent = "";

    try {
      const response = await fetch("https://aionic-agent-api.onrender.com/ask", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ query })
      });

      const data = await response.json();

      if (!response.ok) {
        answerBox.textContent =
          data.detail || "Request limit reached. Please try again later.";
        return;
      }

      answerBox.textContent = data.answer || "No answer returned.";
      document.getElementById("feedback").style.display = "block";

      window.lastInteraction = {
        query: query,
        answer: data.answer
      };
    } catch (err) {
      answerBox.textContent =
        "The agent is waking up or temporarily unavailable. Please try again in a moment.";
    } finally {
      button.disabled = false;
      button.textContent = "Ask";
    }
  };

  window.sendFeedback = async function sendFeedback(type) {
    if (!window.lastInteraction) return;

    const timestamp = new Date().toISOString();

    try {
      await feedbackActor.addFeedback(
        type,
        window.lastInteraction.query,
        window.lastInteraction.answer,
        timestamp
      );

      document.getElementById("feedback").innerHTML =
        "Thanks — this helps improve the agent.";
    } catch (icpErr) {
      console.error("ICP feedback failed, falling back to Render", icpErr);

      try {
        await fetch("https://aionic-agent-api.onrender.com/feedback", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            rating: type,
            query: window.lastInteraction.query,
            answer: window.lastInteraction.answer,
            timestamp: timestamp
          })
        });

        document.getElementById("feedback").innerHTML =
          "Thanks — this helps improve the agent.";
      } catch (renderErr) {
        console.error("Feedback failed", renderErr);
      }
    }
  };
</script>
</body>
</html>
