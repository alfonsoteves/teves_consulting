<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aionic Agent — Teves Consulting</title>

  <style>
    html,
    body {
      min-height: 100%;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      margin: 0;
      padding: 0;
      line-height: 1.5;
      color: #1f2937;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: #ffffff;
    }

    .site-header,
    .site-footer {
      width: 100%;
      border-color: #e5e7eb;
    }

    .site-header {
      border-bottom: 1px solid #e5e7eb;
    }

    .site-footer {
      border-top: 1px solid #e5e7eb;
      margin-top: auto;
      padding: 0px 0;
      color: #64748b;
      font-size: 0.875rem;
    }

    .header-inner,
    .footer-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 25px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-sizing: border-box;
    }

    .header-links {
      display: flex;
      gap: 16px;
      align-items: center;
      font-size: 0.87rem;
    }

    .footer-links {
      display: flex;
      gap: 25px;
      align-items: center;
    }

    .site-header a,
    .site-footer a {
      color: #1f2937;
      text-decoration: none;
    }

    .site-header a:hover,
    .site-footer a:hover {
      text-decoration: underline;
    }

    .brand-link {
      font-size: 1.125rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .page-main {
      width: 100%;
      max-width: 760px;
      margin: 40px auto;
      padding: 0 20px;
      box-sizing: border-box;
      flex: 1;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 0.25rem;
    }

    .subtitle {
      color: #6b7280;
      margin-bottom: 2rem;
    }

    textarea {
      width: 100%;
      min-height: 120px;
      padding: 12px;
      font-size: 1rem;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      box-sizing: border-box;
    }

    button {
      margin-top: 12px;
      padding: 10px 18px;
      border: none;
      border-radius: 10px;
      background: #111827;
      color: white;
      font-size: 1rem;
      cursor: pointer;
    }

    .answer {
      margin-top: 28px;
      padding: 18px;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      background: #f9fafb;
      white-space: pre-wrap;
    }

    @keyframes pulseT {
      0% {
        opacity: 0.35;
        transform: scale(0.96);
      }

      50% {
        opacity: 1;
        transform: scale(1.08);
      }

      100% {
        opacity: 0.35;
        transform: scale(0.96);
      }
    }
    .thinking-logo-img {
      width: 22px;
      height: 22px;
      object-fit: contain;
      animation: pulseT 1.1s infinite ease-in-out;
    }
    .theme-toggle {
      position: fixed;
      top: 18px;
      right: 18px;
      z-index: 1000;

      width: 42px;
      height: 42px;

      border: 1px solid #d1d5db;
      border-radius: 9999px;

      background: white;
      color: #111827;

      cursor: pointer;
      font-size: 1rem;

      display: flex;
      align-items: center;
      justify-content: center;
    }

    body.dark-mode {
      background: #111315;
      color: #f3f4f6;
    }

    body.dark-mode .site-header,
    body.dark-mode .site-footer {
      display: none;
    }

    body.dark-mode .page-main {
      max-width: 720px;
      margin-top: 80px;
    }

    body.dark-mode textarea {
      background: #1a1d21;
      color: #f3f4f6;
      border: 1px solid #2c3138;
    }

    body.dark-mode .answer {
      background: #1a1d21;
      border: 1px solid #2c3138;
      color: #f3f4f6;
    }

    body.dark-mode .subtitle {
      color: #9ca3af;
    }

    body.dark-mode .theme-toggle {
      background: #1f2937;
      color: #f9fafb;
      border: 1px solid #374151;
    }
  </style>
</head>

<body>
<button id="themeToggle" class="theme-toggle" onclick="toggleTheme()">
  🌙
</button>
<header class="site-header">
  <div class="header-inner">
    <a class="brand-link" href="/">Teves Consulting</a>

    <div class="header-links">
      <a href="https://www.tevesconsulting.com/agent.html">EN</a>
      <span>|</span>
      <a href="https://www.tevesconsulting.com/es/agent.html">ES</a>
    </div>
  </div>
</header>

<main class="page-main">
  <h1>Aionic Agent</h1>

  <p class="subtitle">
    Ask a practical question and get a clear, grounded answer.
  </p>

  <textarea
    id="query"
    placeholder="Example: What foods should I always keep at home?"
  ></textarea>

  <br />

<button id="askButton" onclick="askAgent()">Ask</button>

  <div id="answer" class="answer" style="display:none;"></div>

  <div id="feedback" style="margin-top: 10px; display:none;">
<button onclick="sendFeedback('down')">👎 This needs work</button>
  </div>

<script type="module">
  import { Actor, HttpAgent } from "https://esm.sh/@dfinity/agent@2.1.3";
  import { IDL } from "https://esm.sh/@dfinity/candid@2.1.3";

  const BACKEND_CANISTER_ID = "lzsyn-biaaa-aaaai-rakea-cai";

  const idlFactory = ({ IDL }) => {
    return IDL.Service({
      addFeedback: IDL.Func(
        [IDL.Text, IDL.Text, IDL.Text, IDL.Text],
        [IDL.Bool],
        []
      ),
      getFeedbackCount: IDL.Func([], [IDL.Nat], ["query"]),
    });
  };

  const agent = new HttpAgent({
    host: "https://ic0.app",
  });

  const feedbackActor = Actor.createActor(idlFactory, {
    agent,
    canisterId: BACKEND_CANISTER_ID,
  });

  window.askAgent = async function askAgent() {
    const query = document.getElementById("query").value.trim();
    const answerBox = document.getElementById("answer");
    const button = document.getElementById("askButton");

    document.getElementById("feedback").style.display = "none";

    if (!query) return;

    button.disabled = true;
    button.innerHTML = '<img class="thinking-logo-img" src="/assets/images/t-logo-white.png" alt="Loading" />';
    answerBox.style.display = "none";
    answerBox.textContent = "";

    try {
      const response = await fetch("https://aionic-agent-api.onrender.com/ask", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ query })
      });

      const data = await response.json();

      if (!response.ok) {
        answerBox.textContent =
          data.detail || "Request limit reached. Please try again later.";
        return;
      }
      answerBox.style.display = "block";
      answerBox.textContent = data.answer || "No answer returned.";
      document.getElementById("feedback").style.display = "block";

      window.lastInteraction = {
        query: query,
        answer: data.answer
      };

    } catch (err) {
      answerBox.textContent =
        "The agent is temporarily unavailable. Please try again in a moment.";
    } finally {
      button.disabled = false;
      button.textContent = "Ask";
    }
  };

  window.sendFeedback = async function sendFeedback(type) {
    if (!window.lastInteraction) return;

    const timestamp = new Date().toISOString();

    try {
      await feedbackActor.addFeedback(
        type,
        window.lastInteraction.query,
        window.lastInteraction.answer,
        timestamp
      );

      document.getElementById("feedback").innerHTML =
        "Thanks — this helps improve the agent.";

    } catch (icpErr) {
      console.error("ICP feedback failed, falling back to Render", icpErr);

      try {
        await fetch("https://aionic-agent-api.onrender.com/feedback", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            rating: type,
            query: window.lastInteraction.query,
            answer: window.lastInteraction.answer,
            timestamp: timestamp
          })
        });

        document.getElementById("feedback").innerHTML =
          "Thanks — this helps improve the agent.";

      } catch (renderErr) {
        console.error("Feedback failed", renderErr);
      }
    }
  };
</script>
  </main>
<footer class="site-footer">
  <div class="footer-inner">
    <p>
      © <span id="year"></span> Teves Consulting LLC. All rights reserved.
    </p>

    <div class="footer-links">
      <a href="/about-aion.html">About Aion</a>
    </div>
  </div>
</footer>

<script>
  document.getElementById('year').textContent = new Date().getFullYear();
</script>
<script>
  function applyTheme(theme) {
    if (theme === "dark") {
      document.body.classList.add("dark-mode");
      document.getElementById("themeToggle").textContent = "☀️";
    } else {
      document.body.classList.remove("dark-mode");
      document.getElementById("themeToggle").textContent = "🌙";
    }
  }

  function toggleTheme() {
    const isDark = document.body.classList.contains("dark-mode");

    if (isDark) {
      localStorage.setItem("aion-theme", "light");
      applyTheme("light");
    } else {
      localStorage.setItem("aion-theme", "dark");
      applyTheme("dark");
    }
  }

  const savedTheme = localStorage.getItem("aion-theme") || "light";
  applyTheme(savedTheme);
</script>
</body>
</html>
