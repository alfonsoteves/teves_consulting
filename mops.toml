[toolchain]
moc = "1.9.0"
lintoko = "0.10.0"

[dependencies]
core = "2.5.0"
aion_intelligence = "./private/aion_intelligence"

[moc]
args = ["--default-persistent-actors", "-W=M0223,M0236,M0237"]

[canisters.teves_consulting_backend]
main = "src/teves_consulting_backend/main.mo"

[canisters.teves_consulting_backend.check-stable]
path = "deployed/teves_consulting_backend.most"

[build]
args = ["--release"]

[deployed]
dir = "deployed"
